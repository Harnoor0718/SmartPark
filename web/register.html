<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark | Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a2b4a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      background: #1a2b4a;
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 { font-size: 26px; color: #1a2b4a; font-weight: bold; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #444;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
      background: white;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: #1a2b4a; }
    .btn-register {
      width: 100%;
      padding: 14px;
      background: #1a2b4a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-register:hover { background: #c0392b; }
    .error-box {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .success-box {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .login-link a {
      color: #1a2b4a;
      font-weight: bold;
      text-decoration: none;
    }
    .login-link a:hover { color: #c0392b; }
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      .logo h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🅿️</div>
      <h1>SmartPark</h1>
      <p>Create your account</p>
    </div>

    <div class="error-box" id="error-msg"></div>
    <div class="success-box" id="success-msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="username" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 4 characters" />
    </div>

    <div class="form-group">
      <label>Account Type</label>
      <select id="role">
        <option value="customer">Customer</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button class="btn-register" onclick="register()">Create Account</button>

    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errorBox = document.getElementById('error-msg');
      const successBox = document.getElementById('success-msg');
      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      if (!username || !email || !password) {
        errorBox.style.display = 'block';
        errorBox.innerText = 'Please fill in all fields!';
        return;
      }

      try {
        const res = await fetch('http://localhost:8080/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, role })
        });
        const data = await res.json();
        if (data.status === 'success') {
          successBox.style.display = 'block';
          successBox.innerText = '✅ Registered successfully! Redirecting to login...';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          errorBox.style.display = 'block';
          errorBox.innerText = data.message;
        }
      } catch (err) {
        errorBox.style.display = 'block';
        errorBox.innerText = 'Could not connect to server. Make sure Spring Boot is running.';
      }
    }
  </script>
</body>
</html>
