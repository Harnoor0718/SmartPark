<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark | Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🅿️ SmartPark</h1>
      <h2>Register</h2>
      <div id="error-msg" class="error-box" style="display:none;"></div>
      <div id="success-msg" class="success-box" style="display:none;"></div>
      <input type="text" id="username" placeholder="Full Name" />
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <select id="role">
        <option value="customer">Customer</option>
        <option value="admin">Admin</option>
      </select>
      <button onclick="register()">Register</button>
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errorBox = document.getElementById('error-msg');
      const successBox = document.getElementById('success-msg');
      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      try {
        const res = await fetch('http://localhost:8080/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, role })
        });
        const data = await res.json();
        if (data.status === 'success') {
          successBox.style.display = 'block';
          successBox.innerText = 'Registered successfully! Redirecting to login...';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          errorBox.style.display = 'block';
          errorBox.innerText = data.message;
        }
      } catch (err) {
        errorBox.style.display = 'block';
        errorBox.innerText = 'Could not connect to server. Make sure Spring Boot is running.';
      }
    }
  </script>
</body>
</html>
