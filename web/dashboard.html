<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark | Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span>🅿️ SmartPark</span>
    <div>
      <span id="nav-username"></span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="welcome-card">
      <h2>Welcome, <span id="welcome-name"></span>! 👋</h2>
      <p>Role: <span id="user-role"></span></p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>🚗 Total Slots</h3>
        <p class="stat-number">20</p>
      </div>
      <div class="stat-card">
        <h3>✅ Available</h3>
        <p class="stat-number" id="available-slots">20</p>
      </div>
      <div class="stat-card">
        <h3>❌ Occupied</h3>
        <p class="stat-number" id="occupied-slots">0</p>
      </div>
      <div class="stat-card">
        <h3>📍 Location</h3>
        <p class="stat-number" style="font-size:16px;">SmartPark Central</p>
      </div>
    </div>

    <div class="slots-section">
      <h3>Parking Slots</h3>
      <div class="slots-grid" id="slots-grid">
        <p>Loading slots...</p>
      </div>
    </div>
  </div>

  <script>
    // Check if logged in
    const username = localStorage.getItem('username');
    const role = localStorage.getItem('role');
    if (!username) window.location.href = 'login.html';

    document.getElementById('nav-username').innerText = username;
    document.getElementById('welcome-name').innerText = username;
    document.getElementById('user-role').innerText = role.toUpperCase();

    // Render sample slots (since slot API comes in Week 2)
    const slots = [
      {id:'A1',type:'CAR'},{id:'A2',type:'CAR'},{id:'A3',type:'CAR'},
      {id:'A4',type:'CAR'},{id:'A5',type:'CAR'},{id:'A6',type:'CAR'},
      {id:'A7',type:'CAR'},{id:'A8',type:'CAR'},{id:'A9',type:'CAR'},
      {id:'A10',type:'CAR'},{id:'B1',type:'BIKE'},{id:'B2',type:'BIKE'},
      {id:'B3',type:'BIKE'},{id:'B4',type:'BIKE'},{id:'B5',type:'BIKE'},
      {id:'B6',type:'BIKE'},{id:'B7',type:'BIKE'},{id:'T1',type:'TRUCK'},
      {id:'T2',type:'TRUCK'},{id:'T3',type:'TRUCK'}
    ];

    const grid = document.getElementById('slots-grid');
    grid.innerHTML = '';
    slots.forEach(slot => {
      const div = document.createElement('div');
      div.className = 'slot-card available';
      div.innerHTML = `<strong>${slot.id}</strong><br><small>${slot.type}</small>`;
      grid.appendChild(div);
    });

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
