<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark – Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        nav {
            background: #1a73e8;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav span {
            font-size: 20px;
            font-weight: bold;
        }

        nav button {
            width: auto;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid white;
        }

        .page-title {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding: 0 20px 20px;
        }

        .slot-card {
            background: #4caf50;
            color: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .slot-card.occupied {
            background: #f44336;
            cursor: not-allowed;
        }
    </style>
</head>
<body style="display:block; padding:0;">

    <nav>
        <span>SmartPark</span>
        <button onclick="logout()">Logout</button>
    </nav>

    <p class="page-title">Parking Slots</p>

    <div class="slot-grid">
        <div class="slot-card">A1</div>
        <div class="slot-card">A2</div>
        <div class="slot-card occupied">A3</div>
        <div class="slot-card">A4</div>
        <div class="slot-card occupied">A5</div>
        <div class="slot-card">A6</div>
        <div class="slot-card">A7</div>
        <div class="slot-card occupied">A8</div>
    </div>

    <script>
        function logout() {
            // TODO: clear token and redirect
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
