<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark | Check In / Check Out</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f0f2f5; }
    nav {
      background: #1a2b4a;
      color: white;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav span { font-size: 20px; font-weight: bold; }
    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 6px;
    }
    .page-container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .page-header {
      background: linear-gradient(135deg, #1a2b4a, #c0392b);
      color: white;
      padding: 28px 32px;
    }
    .page-header h2 { margin: 0 0 6px; font-size: 24px; }
    .page-header p { margin: 0; opacity: 0.85; font-size: 14px; }
    .form-body { padding: 28px 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #1a2b4a; }
    .booking-details {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:last-child { font-weight: bold; color: #1a2b4a; }
    .status-badge {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 15px;
    }
    .status-pending { background: #fff3e0; color: #f57c00; }
    .status-active { background: #e8f5e9; color: #2e7d32; }
    .status-completed { background: #e3f2fd; color: #1565c0; }
    .btn-checkin {
      width: 100%;
      padding: 14px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-checkin:hover { background: #388e3c; }
    .btn-checkout {
      width: 100%;
      padding: 14px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-checkout:hover { background: #c0392b; }
    .btn-disabled {
      width: 100%;
      padding: 14px;
      background: #ccc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: not-allowed;
      margin-bottom: 10px;
    }
    .btn-back {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #666;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .bill-box {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .bill-box h3 { color: #2e7d32; margin: 0 0 8px; }
    .bill-amount { font-size: 36px; font-weight: bold; color: #1a2b4a; }
    .search-box { margin-bottom: 20px; }
  </style>
</head>
<body>

  <nav>
    <span>🅿️ SmartPark</span>
    <a href="dashboard.html">← Dashboard</a>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <h2>🔑 Check In / Check Out</h2>
      <p>Enter your Booking ID to manage your parking session</p>
    </div>

    <div class="form-body">

      <!-- Search by Booking ID -->
      <div class="search-box">
        <div class="form-group">
          <label>Enter Booking ID</label>
          <input type="number" id="booking-id-input"
            placeholder="e.g. 5"
            value="" />
        </div>
        <button class="btn-checkin" onclick="loadBooking()">🔍 Find Booking</button>
      </div>

      <!-- Booking Details (hidden until loaded) -->
      <div id="booking-section" style="display:none;">

        <div class="booking-details">
          <div class="detail-row">
            <span>Booking ID</span>
            <span id="b-id">--</span>
          </div>
          <div class="detail-row">
            <span>Vehicle Plate</span>
            <span id="b-plate">--</span>
          </div>
          <div class="detail-row">
            <span>Slot ID</span>
            <span id="b-slot">--</span>
          </div>
          <div class="detail-row">
            <span>Check In Time</span>
            <span id="b-checkin">--</span>
          </div>
          <div class="detail-row">
            <span>Check Out Time</span>
            <span id="b-checkout">--</span>
          </div>
          <div class="detail-row">
            <span>Total Amount</span>
            <span id="b-amount">--</span>
          </div>
        </div>

        <div id="status-badge" class="status-badge status-pending">Status: PENDING</div>

        <div id="bill-box" class="bill-box" style="display:none;">
          <h3>✅ Payment Due</h3>
          <div class="bill-amount" id="bill-amount">Rs.0</div>
          <p style="color:#555;font-size:13px;">Please pay at the exit counter</p>
        </div>

        <button id="btn-checkin" class="btn-checkin" onclick="doCheckIn()">✅ Check In</button>
        <button id="btn-checkout" class="btn-disabled" onclick="doCheckOut()" disabled>🚗 Check Out</button>
        <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
      </div>

    </div>
  </div>

  <script>
    // Auto-fill booking ID from localStorage if coming from booking page
    const savedBookingId = localStorage.getItem('bookingId');
    if (savedBookingId) {
      document.getElementById('booking-id-input').value = savedBookingId;
    }

    let currentBooking = null;

    function loadBooking() {
      const bookingId = document.getElementById('booking-id-input').value;
      if (!bookingId) { alert('Please enter a Booking ID!'); return; }

      fetch(`http://localhost:8080/api/bookings/${bookingId}`)
        .then(r => r.json())
        .then(data => {
          if (data.status === 'success') {
            currentBooking = data.booking;
            displayBooking(currentBooking);
          } else {
            alert('❌ Booking not found!');
          }
        })
        .catch(err => alert('Error: ' + err));
    }

    function displayBooking(booking) {
      document.getElementById('booking-section').style.display = 'block';
      document.getElementById('b-id').innerText = '#' + booking.id;
      document.getElementById('b-plate').innerText = booking.vehiclePlate;
      document.getElementById('b-slot').innerText = 'Slot ' + booking.slotId;
      document.getElementById('b-checkin').innerText = booking.checkInTime || 'Not checked in yet';
      document.getElementById('b-checkout').innerText = booking.checkOutTime || 'Not checked out yet';
      document.getElementById('b-amount').innerText = booking.totalAmount > 0 ? 'Rs.' + booking.totalAmount : 'Pending';

      const badge = document.getElementById('status-badge');
      const btnCheckin = document.getElementById('btn-checkin');
      const btnCheckout = document.getElementById('btn-checkout');

      if (booking.status === 'PENDING') {
        badge.className = 'status-badge status-pending';
        badge.innerText = '⏳ Status: PENDING — Ready to Check In';
        btnCheckin.disabled = false;
        btnCheckin.className = 'btn-checkin';
        btnCheckout.disabled = true;
        btnCheckout.className = 'btn-disabled';
      } else if (booking.status === 'ACTIVE') {
        badge.className = 'status-badge status-active';
        badge.innerText = '✅ Status: ACTIVE — Currently Parked';
        btnCheckin.disabled = true;
        btnCheckin.className = 'btn-disabled';
        btnCheckout.disabled = false;
        btnCheckout.className = 'btn-checkout';
      } else if (booking.status === 'COMPLETED') {
        badge.className = 'status-badge status-completed';
        badge.innerText = '🔵 Status: COMPLETED';
        btnCheckin.disabled = true;
        btnCheckin.className = 'btn-disabled';
        btnCheckout.disabled = true;
        btnCheckout.className = 'btn-disabled';
        if (booking.totalAmount > 0) {
          document.getElementById('bill-box').style.display = 'block';
          document.getElementById('bill-amount').innerText = 'Rs.' + booking.totalAmount;
        }
      }
    }

    function doCheckIn() {
      const bookingId = currentBooking.id;
      fetch('http://localhost:8080/api/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookingId: bookingId })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          alert('✅ Checked in successfully!');
          loadBooking();
        } else {
          alert('❌ ' + data.message);
        }
      })
      .catch(err => alert('Error: ' + err));
    }

    function doCheckOut() {
      const bookingId = currentBooking.id;
      fetch('http://localhost:8080/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookingId: bookingId })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          alert('✅ Checked out! Total Amount: Rs.' + data.totalAmount);
          loadBooking();
        } else {
          alert('❌ ' + data.message);
        }
      })
      .catch(err => alert('Error: ' + err));
    }
  </script>

</body>
</html>
