<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark – Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        nav {
            background: #1a73e8;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav span { font-size: 20px; font-weight: bold; }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid white;
            border-radius: 6px;
        }

        .page-content { padding: 20px; }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card-stat {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card-stat .value {
            font-size: 28px;
            font-weight: bold;
            color: #1a73e8;
        }

        .card-stat .label {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .chart-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .chart-box h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
        }

        @media (min-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>
<body style="display:block; padding:0;">

    <nav>
        <span>SmartPark — Analytics</span>
        <a href="dashboard.html">← Dashboard</a>
    </nav>

    <div class="page-content">

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="card-stat">
                <div class="value">₹5,200</div>
                <div class="label">Total Revenue</div>
            </div>
            <div class="card-stat">
                <div class="value">104</div>
                <div class="label">Total Bookings</div>
            </div>
            <div class="card-stat">
                <div class="value">73%</div>
                <div class="label">Avg Occupancy</div>
            </div>
            <div class="card-stat">
                <div class="value">₹50</div>
                <div class="label">Avg Per Booking</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-box">
                <h3>📊 Daily Revenue (₹)</h3>
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>🅿️ Occupancy Rate (%)</h3>
                <canvas id="occupancyChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>⏰ Peak Hours</h3>
                <canvas id="peakChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        // Revenue Bar Chart
        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: days,
                datasets: [{
                    label: 'Revenue (₹)',
                    data: [450, 620, 380, 710, 890, 1200, 950],
                    backgroundColor: '#1a73e8'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Occupancy Line Chart
        new Chart(document.getElementById('occupancyChart'), {
            type: 'line',
            data: {
                labels: days,
                datasets: [{
                    label: 'Occupancy %',
                    data: [60, 75, 45, 80, 90, 100, 85],
                    borderColor: '#4caf50',
                    backgroundColor: 'rgba(76,175,80,0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Peak Hours Chart
        new Chart(document.getElementById('peakChart'), {
            type: 'bar',
            data: {
                labels: ['8am','9am','10am','11am','12pm','1pm','2pm','3pm','4pm','5pm'],
                datasets: [{
                    label: 'Bookings',
                    data: [5, 12, 8, 6, 15, 18, 10, 7, 14, 9],
                    backgroundColor: '#f44336'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    </script>

</body>
</html>
